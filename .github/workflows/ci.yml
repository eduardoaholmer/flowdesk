name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint, type-check, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowdesk
          POSTGRES_PASSWORD: flowdesk
          POSTGRES_DB: flowdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowdesk -d flowdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==1.8.3

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy src

      - name: Alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://flowdesk:flowdesk@localhost:5432/flowdesk
        run: poetry run alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://flowdesk:flowdesk@localhost:5432/flowdesk
          REDIS_URL: redis://localhost:6379/0
        run: poetry run pytest -v

  frontend:
    name: Frontend — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Vitest
        run: npm run test

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000/api/v1
        run: npm run build
