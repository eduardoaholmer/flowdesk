      JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAr0FxunGNtYrO+OQT8vmb\nOdG4+rO1XClx/d+X5K/2u8415yxNU3l9k5fP2W0gO4DzXA/IbcuJ5qpK19HOc30E\n7DB5JkeA0ZaJNEDspCMoXcHcj5d1nWxMgF1OkpXd0lSX2nf40rh4IoYnn4gFRL21\nTOdF+5D9fvNtqNFxtJjQEOryAt+MQvhPbpmuPulYAxP+d21rXFNAdWiFMD9/yt89\nMnoLYLJ9GUMwk5GcPRMl73mYvQcZE8YRJMLYKjzGpmE1vfGz3UGEDGCg8GNh95Wr\nDo4Ri+7wgQDv7cFOqu4iILLMdcGK1r3s2BmiDru7oVtaAdIlH41KDQrCHgZrhIAC\nAQIDAQAB\n-----END PUBLIC KEY-----"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowdesk
          POSTGRES_PASSWORD: flowdesk
          POSTGRES_DB: flowdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowdesk -d flowdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # `bitnami/minio` (não a imagem oficial `minio/minio`) de propósito: o
      # bloco `services:` do GitHub Actions não aceita `command:`, e a imagem
      # oficial exige `server /data` explícito para não só imprimir o help e
      # sair — a variante Bitnami já roda o servidor via env vars sozinha, sem
      # override de comando (mesma razão pela qual `docker-compose.yml`, que
      # aceita `command:`, usa a imagem oficial). Sem `--health-cmd` aqui — não
      # há garantia de `curl`/`mc` dentro da imagem para o Docker healthcheck
      # rodar; a etapa "Aguardar MinIO" abaixo faz o polling pelo runner.
      minio:
        image: bitnami/minio:2024
        env:
          MINIO_ROOT_USER: flowdesk
          MINIO_ROOT_PASSWORD: flowdesk123
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==1.8.3

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy src

      - name: Alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://flowdesk:flowdesk@localhost:5432/flowdesk
          REDIS_URL: redis://localhost:6379/0
          JWT_PRIVATE_KEY: ${{ env.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.JWT_PUBLIC_KEY }}
        run: poetry run alembic upgrade head

      # Sem `--health-cmd` no serviço `minio` acima (ver comentário lá) — espera
      # aqui pelo runner, mesmo princípio de "poll, não sleep fixo" já seguido
      # pelo resto do projeto.
      - name: Aguardar MinIO
        run: timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://flowdesk:flowdesk@localhost:5432/flowdesk
          REDIS_URL: redis://localhost:6379/0
          JWT_PRIVATE_KEY: ${{ env.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.JWT_PUBLIC_KEY }}
          AWS_ACCESS_KEY_ID: flowdesk
          AWS_SECRET_ACCESS_KEY: flowdesk123
          S3_TEST_ENDPOINT_URL: http://localhost:9000
          S3_TEST_BUCKET_NAME: flowdesk-test
          S3_TEST_REGION: us-east-1
        run: poetry run pytest -v

      # Não bloqueante deliberadamente (CLAUDE.md §1.6): advisories de dependências
      # transitivas fora do nosso controle tornariam este step barulhento o bastante
      # para virar ruído ignorado, o oposto do que um gate de CI deveria ser. Ainda
      # assim roda em toda PR — o resultado fica visível no summary do job.
      - name: pip-audit (dependências vulneráveis — não bloqueante)
        continue-on-error: true
        run: |
          poetry run pip install pip-audit
          poetry run pip-audit --local

  frontend:
    name: Frontend — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Vitest
        run: npm run test

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000/api/v1
        run: npm run build

      # Não bloqueante pelo mesmo motivo do pip-audit do job backend acima.
      - name: npm audit (dependências vulneráveis — não bloqueante)
        continue-on-error: true
        run: npm audit --audit-level=high

  docker:
    name: Docker — build de imagens de produção
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend (production)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/backend.Dockerfile
          target: production
          push: false

      - name: Build frontend (production)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          target: production
          push: false
          build-args: |
            VITE_API_URL=http://localhost:8000/api/v1
