services:
  # Credenciais fixas abaixo (flowdesk/flowdesk) são válidas apenas para desenvolvimento
  # local — nunca reaproveitar em um ambiente compartilhado ou de produção.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk
      POSTGRES_DB: flowdesk
    ports:
      - "5432:5432"
    volumes:
      - flowdesk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowdesk -d flowdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO (S3-compatible) — só é consumido de fato quando `STORAGE_PROVIDER=s3`
  # está setado (default do backend é "local", disco); existe aqui sobretudo
  # para `poetry run pytest` exercitar `tests/integration/test_s3_storage_provider.py`
  # contra um serviço real, mesmo padrão de Postgres/Redis acima (Sprint 17.2/M6,
  # ADR-038). Credenciais fixas abaixo são de desenvolvimento local, mesmo
  # racional do Postgres.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: flowdesk
      MINIO_ROOT_PASSWORD: flowdesk123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - flowdesk_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://flowdesk:flowdesk@postgres:5432/flowdesk
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: development
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flowdesk_postgres_data:
  flowdesk_minio_data:
